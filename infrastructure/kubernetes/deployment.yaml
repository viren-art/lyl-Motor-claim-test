apiVersion: apps/v1
kind: Deployment
metadata:
  name: roojai-claims-api
  namespace: roojai-claims
  labels:
    app: roojai-claims-api
    version: v1.0.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: roojai-claims-api
  template:
    metadata:
      labels:
        app: roojai-claims-api
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: roojai-claims-api
      containers:
      - name: api
        image: ${ECR_REGISTRY}/roojai-claims-api:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: roojai-claims-secrets
              key: database-url
        - name: TRIAGE_SERVICE_URL
          value: "http://triage-service:8001"
        - name: TRIAGE_SERVICE_SECONDARY_URL
          value: "http://triage-service-secondary:8001"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: roojai-claims-secrets
              key: redis-url
        - name: AWS_REGION
          value: "ap-southeast-1"
        - name: S3_BUCKET_NAME
          value: "roojai-claims-documents-prod"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: roojai-claims-api
  namespace: roojai-claims
  labels:
    app: roojai-claims-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: roojai-claims-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: roojai-claims-api-hpa
  namespace: roojai-claims
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: roojai-claims-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "100"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 25
        periodSeconds: 60
      - type: Pods
        value: 1
        periodSeconds: 60
      selectPolicy: Min